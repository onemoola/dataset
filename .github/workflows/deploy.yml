name: Deploy to GitHub Pages

on:
  push:
    branches: [ 'main' ]

  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: uv sync

      - name: Export notebooks
        run: |
          mkdir -p _site
          
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Dataseka — Open data notebooks</title>
          <link rel="icon" type="image/png" sizes="32x32" href="https://dataseka.com/favicon-32x32.png">
          <link rel="icon" type="image/png" sizes="16x16" href="https://dataseka.com/favicon-16x16.png">
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=swap">
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root { --coral: #FF5A5F; }
            html, body { height: 100%; }
            body { font-family: 'Ubuntu', system-ui, sans-serif; color: #1a1a1a; display: flex; flex-direction: column; min-height: 100vh; background: #fff; }
            a { text-decoration: none; color: inherit; }
            nav { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 3rem; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
            .nav-logo { display: flex; align-items: center; gap: 10px; }
            .nav-logo img { height: 24px; width: auto; display: block; }
            .nav-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
            .nav-ext { font-size: 14px; color: #6b7280; display: flex; align-items: center; gap: 5px; }
            .nav-ext:hover { color: #1a1a1a; }
            main { flex: 1; padding: 0 3rem; }
            .hero { padding: 5rem 0 3.5rem; max-width: 560px; }
            .eyebrow { font-size: 11px; font-weight: 500; color: var(--coral); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
            h1 { font-size: 32px; font-weight: 500; line-height: 1.25; margin-bottom: 1rem; }
            .sub { font-size: 16px; color: #6b7280; line-height: 1.7; }
            .divider { height: 0.5px; background: rgba(0,0,0,0.1); }
            .notebooks { padding: 3.5rem 0 0; }
            .section-label { font-size: 11px; font-weight: 500; color: #9ca3af; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0; }
            .card { padding: 2rem 1.5rem 2rem 0; display: block; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
            .card:hover .card-name { color: var(--coral); }
            .card:hover .card-arrow { opacity: 1; transform: translateX(3px); }
            .card-icon { width: 40px; height: 40px; border-radius: 10px; background: #fff0f0; display: grid; place-items: center; margin-bottom: 1.5rem; font-size: 18px; }
            .card-name { font-size: 15px; font-weight: 500; margin-bottom: 6px; transition: color 0.15s; }
            .card-desc { font-size: 13px; color: #6b7280; line-height: 1.6; }
            .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; }
            .tag { font-size: 11px; color: #9ca3af; }
            .card-arrow { font-size: 16px; color: var(--coral); opacity: 0; transition: opacity 0.15s, transform 0.15s; }
            footer { padding: 2.5rem 3rem; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; margin-top: 5rem; }
            footer span, footer a { font-size: 12px; color: #9ca3af; }
            footer a:hover { color: #6b7280; }
          </style>
          </head>
          <body>
          <nav>
            <a class="nav-logo" href="https://dataseka.com">
              <img src="https://dataseka.com/logo.svg" alt="Dataseka">
              <span class="nav-name">Dataseka</span>
            </a>
            <a class="nav-ext" href="https://dataseka.com">
              dataseka.com
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </nav>
          <main>
            <div class="hero">
              <p class="eyebrow">South Africa</p>
              <h1>Open data notebooks</h1>
              <p class="sub">Interactive notebooks exploring South African public datasets. Each notebook ingests, transforms, and visualises data from official sources.</p>
            </div>
            <div class="divider"></div>
            <div class="notebooks">
              <p class="section-label">Available notebooks</p>
              <div class="grid">
          HTMLEOF
          
          for file in south_africa/*.py; do
            filename=$(basename "$file")
            [ "$filename" = "shared.py" ] && continue
            [ "$filename" = "__init__.py" ] && continue
            name="${filename%.*}"
          
            title=$(python3 -c "import sys; print(sys.argv[1].replace('_', ' ').title())" "$name")
          
            case "$name" in
              "gross_domestic_product")
                desc="Quarterly GDP releases from StatsSA P0441, normalised to the Dataseka target format."
                icon="💰"
                ;;
              "inflation")
                desc="Monthly CPI and inflation data tracking the cost of living across South Africa."
                icon="📈"
                ;;
              *)
                desc="Data ingestion, transformation, and visual history tracking for this public indicator."
                icon="📊"
                ;;
            esac
          
            uv run marimo export html-wasm "$file" -o "_site/${name}" --mode run
            cat >> _site/index.html << CARDEOF
                <a class="card" href="${name}/index.html">
                  <div class="card-icon">${icon}</div>
                  <p class="card-name">${title}</p>
                  <p class="card-desc">${desc}</p>
                  <div class="card-footer">
                    <span class="tag">StatsSA</span>
                    <span class="card-arrow">&#8594;</span>
                  </div>
                </a>
          CARDEOF
          done
          
          cat >> _site/index.html << 'HTMLEOF'
              </div>
            </div>
          </main>
          <footer>
            <span>&#169; 2026 Dataseka (Pty) Limited</span>
            <a href="https://dataseka.com/privacy-policy">Privacy policy</a>
          </footer>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
